# animations - end-4 inspired, fast and snappy

animations {
    enabled = true

    # bezier curves
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = fast, 0.42, 1.67, 0.21, 0.90
    bezier = slow, 0.39, 1.29, 0.35, 0.98
    bezier = emph, 0.05, 0.7, 0.1, 1

    # windows
    animation = windowsIn, 1, 3, emph, popin 80%
    animation = windowsOut, 1, 2, emph, popin 90%
    animation = windowsMove, 1, 3, emph, slide

    # fade
    animation = fadeIn, 1, 3, emph
    animation = fadeOut, 1, 2, emph

    # borders
    animation = border, 1, 10, emph

    # layers
    animation = layersIn, 1, 3, emph
    animation = layersOut, 1, 2, emph

    # workspaces
    animation = workspaces, 1, 5, emph, slide
    animation = workspacesIn, 1, 3, emph, slide
    animation = workspacesOut, 1, 2, emph, slide

    # scratchpad
    animation = specialWorkspaceIn, 1, 3, emph, slidevert
    animation = specialWorkspaceOut, 1, 2, emph, slidevert
}
