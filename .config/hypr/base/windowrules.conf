# window rules

# dont animate when XWayland apps ask to maximize
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# picture-in-picture (float, pin, keep aspect ratio)
windowrule = float on, match:title (Picture-in-Picture)$
windowrule = pin on, match:title (Picture-in-Picture)$
windowrule = keep_aspect_ratio on, match:title (Picture-in-Picture)$

# file pickers & dialogs
windowrule = float on, match:class (xdg-desktop-portal-gtk)
windowrule = float on, match:class (thunar), match:title (Open|Save|Properties|File|Choose)

# utility windows
windowrule = float on, match:class (pulsemixer)
windowrule = center on, match:class (pulsemixer)
windowrule = size 700 480, match:class (pulsemixer)
windowrule = float on, match:class (nmtui)
windowrule = center on, match:class (nmtui)
windowrule = size 700 480, match:class (nmtui)

# wofi launches instantly
windowrule = no_anim on, match:class (wofi)

