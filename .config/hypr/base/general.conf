# general settings

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(eeeeeeaa)
    col.inactive_border = rgba(2a2a2aaa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.92

    dim_inactive = true
    dim_strength = 0.05

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1
        new_optimizations = true
        xray = true
    }

    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = rgba(00000050)
    }
}

binds {
    workspace_back_and_forth = true
}

cursor {
    no_warps = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
}

dwindle {
    force_split = 2
    preserve_split = true
    split_width_multiplier = 2
    # split_width_multiplier = 1 for a normal monitor
    # split_width_multiplier = 2 for an ultrawide monitor
}

master {
    new_status = master
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 1.5
    }
}

xwayland {
    force_zero_scaling = true
}


