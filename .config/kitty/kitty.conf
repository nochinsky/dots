# using a common monospace font. change this to your preferred font later
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic
font_size        17.0

# remove all window decorations (title bar, padding) for a minimal look
hide_window_decorations yes

# add a tiny bit of padding so text doesnt touch the edge
window_padding_width 4

# a simple block cursor that doesnt blink
cursor_shape block
cursor_blink_interval 0

# keep a reasonable amount of scrollback history
scrollback_lines 5000

# disable the audible terminal bell (its annoying asf)
enable_audio_bell no

# use default shell
shell .

# sync to monitor refresh rate
# sync_to_monitor yes

# ----- Colourscheme -----
foreground #d0d0d0
background #000000
cursor #d0d0d0
cursor_text_color #1a1a1a
selection_foreground #1a1a1a
selection_background #555555
confirm_os_window_close 0
